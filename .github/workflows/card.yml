name: Update README Cards

on:
  
  # The job should run at least once on branches that are not main
   push:
     branches-ignore:
       - main
   schedule:
     - cron: "0 0 * * *"
   workflow_dispatch: # Used to trigger the job manually
     
jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v6
        
      - name: Create the GitHub Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Top GitHub languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
           card: top-langs
           options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=dark
           path: profile/top-langs.svg
           token: ${{ secrets.GITHUB_TOKEN }}
           
      - name: Commit the created cards
        
        # Set up the "bot" that will push the newly created images on the repo
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/*.svg
            git commit -m "Update GitHub stats cards" || exit 0
            git push